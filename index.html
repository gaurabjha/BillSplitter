<!DOCTYPE html>
<html lang="en">
<head>
    <title>BillSplitter</title>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
        integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog=="
        crossorigin="anonymous" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!-- App scripts -->
    <script src="resources/js/split_algo.js"></script>
    <script src="resources/js/AddExpense.js"></script>

    <style>
        :root {
            --bg:           #0f0f13;
            --surface:      #19191f;
            --surface2:     #222228;
            --border:       #2e2e38;
            --accent:       #7c6af7;
            --accent-light: #a699ff;
            --accent-glow:  rgba(124,106,247,0.18);
            --green:        #3ecf8e;
            --green-dim:    rgba(62,207,142,0.12);
            --red:          #f06a6a;
            --red-dim:      rgba(240,106,106,0.1);
            --text:         #e8e8f0;
            --text-muted:   #7a7a94;
            --text-dim:     #55556e;
            --radius:       14px;
            --radius-sm:    8px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            min-height: 100vh;
            min-width: 360px;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
        }

        /* ── HEADER ─────────────────────────────── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 22px 36px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: var(--accent);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 24px var(--accent-glow);
            flex-shrink: 0;
        }
        header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }
        header p { margin: 0; color: var(--text-muted); font-size: 0.82rem; }
        .header-badge {
            margin-left: auto;
            background: var(--accent-glow);
            border: 1px solid var(--accent);
            color: var(--accent-light);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.72rem;
            font-weight: 500;
        }

        /* ── LAYOUT ─────────────────────────────── */
        .app-wrapper {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px 80px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* ── STEP INDICATOR ─────────────────────── */
        .steps {
            display: flex;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .step {
            flex: 1;
            padding: 11px 14px;
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.78rem;
            color: var(--text-dim);
            border-right: 1px solid var(--border);
            transition: background 0.3s, color 0.3s;
        }
        .step:last-child { border-right: none; }
        .step.active { background: var(--accent-glow); color: var(--accent-light); }
        .step.done   { color: var(--green); background: var(--green-dim); }
        .step-num {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 1.5px solid currentColor;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.68rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .step.done .step-num {
            background: var(--green);
            border-color: var(--green);
            color: #0f0f13;
        }

        /* ── CARDS ──────────────────────────────── */
        .bs-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .bs-card-header {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bs-card-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin: 0;
        }
        .header-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--accent-glow);
            color: var(--accent-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }
        .bs-card-body { padding: 22px; }

        /* ── FORM ───────────────────────────────── */
        .bs-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .bs-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 9px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .bs-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .input-hint {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 5px;
        }

        /* ── BUTTONS ────────────────────────────── */
        .btn-primary-bs {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px 22px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary-bs:hover {
            opacity: 0.9;
            box-shadow: 0 4px 20px var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            padding: 8px 15px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.83rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent-light); }
        .btn-green {
            background: var(--green);
            color: #0f0f13;
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px 22px;
            font-family: 'Syne', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-green:hover { opacity: 0.85; transform: translateY(-1px); }

        /* ── SELECT2 DARK OVERRIDES ─────────────── */
        .select2-container--default .select2-selection--multiple {
            background: var(--surface2) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
            min-height: 40px !important;
            padding: 3px 6px !important;
        }
        .select2-container--default.select2-container--focus .select2-selection--multiple {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important;
            outline: none !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background: var(--accent) !important;
            border: none !important;
            color: #fff !important;
            border-radius: 6px !important;
            padding: 2px 8px !important;
            font-size: 0.78rem;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            color: rgba(255,255,255,0.65) !important;
            margin-right: 4px;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__rendered {
            color: var(--text-muted) !important;
        }
        .select2-dropdown {
            background: var(--surface2) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
        }
        .select2-container--default .select2-results__option {
            color: var(--text) !important;
            padding: 8px 12px;
            font-size: 0.87rem;
        }
        .select2-container--default .select2-results__option--highlighted {
            background: var(--accent-glow) !important;
            color: var(--accent-light) !important;
        }
        .select2-container--default .select2-results__option[aria-selected="true"] {
            background: var(--surface) !important;
            color: var(--text-dim) !important;
        }
        .select2-search--dropdown .select2-search__field {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 6px !important;
            padding: 6px 10px;
            outline: none;
        }
        .select2-container--default .select2-selection--single {
            background: var(--surface2) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
            height: 38px !important;
        }
        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: var(--text) !important;
            line-height: 38px !important;
            padding-left: 12px !important;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow {
            top: 7px !important;
        }

        /* ── EXPENSE TABLE ──────────────────────── */
        .expense-table-wrap {
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        table.expense-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        table.expense-table thead tr { background: var(--surface2); }
        table.expense-table th {
            padding: 10px 12px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        table.expense-table td {
            padding: 9px 9px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            background: var(--surface);
        }
        table.expense-table tbody tr:last-child td { border-bottom: none; }
        table.expense-table tbody tr:hover td { background: var(--surface2); transition: background 0.15s; }
        .delete-btn {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background 0.2s;
            font-size: 13px;
        }
        .delete-btn:hover { background: var(--red-dim); }

        /* ── SUMMARY BAR ────────────────────────── */
        .summary-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .summary-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 11px;
            font-size: 0.76rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .chip-name { color: var(--text); font-weight: 500; }
        .chip-amount { color: var(--accent-light); font-weight: 600; }

        /* ── REPORT ─────────────────────────────── */
        .section-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .totals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 6px;
        }
        .total-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }
        .tc-name { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
        .tc-amount { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; }

        .settlement-list { display: flex; flex-direction: column; gap: 9px; }
        .settlement-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 11px;
            animation: fadeUp 0.35s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .settlement-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .av-0 { background: rgba(124,106,247,0.2); color: #a699ff; }
        .av-1 { background: rgba(62,207,142,0.15); color: #3ecf8e; }
        .av-2 { background: rgba(240,106,106,0.12); color: #f06a6a; }
        .av-3 { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .av-4 { background: rgba(56,189,248,0.15); color: #38bdf8; }

        .settlement-text { font-size: 0.86rem; color: var(--text); }
        .settlement-text span { font-weight: 600; }
        .settlement-arrow { color: var(--text-dim); font-size: 12px; }
        .settlement-amount {
            margin-left: auto;
            font-family: 'Syne', sans-serif;
            font-size: 0.98rem;
            font-weight: 700;
            color: var(--green);
        }
        .no-debts { text-align: center; padding: 36px 20px; color: var(--text-muted); }
        .no-debts i { font-size: 2.2rem; color: var(--green); display: block; margin-bottom: 10px; }

        /* ── UTILITIES ──────────────────────────── */
        .hidden { display: none !important; }

        /* ── FOOTER ─────────────────────────────── */
        footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 22px 20px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
        footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: var(--accent-light); }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .social-links a {
            width: 32px; height: 32px;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .social-links a:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
        }

        @media (max-width: 600px) {
            header { padding: 16px 18px; }
            .header-badge { display: none; }
            .app-wrapper { margin: 18px auto; }
            .bs-card-body { padding: 16px; }
        }
    </style>
</head>

<body>

<!-- ══ HEADER ═══════════════════════════════════════════════════════════ -->
<header>
    <div class="logo-icon">&#9988;</div>
    <div>
        <h1>BillSplitter</h1>
        <p>Split smarter, settle faster</p>
    </div>
    <span class="header-badge">&#10022; Free &amp; Open Source</span>
</header>

<!-- ══ APP ══════════════════════════════════════════════════════════════ -->
<div class="app-wrapper">

    <!-- Step Indicator -->
    <div class="steps">
        <div class="step active" id="step1">
            <div class="step-num">1</div>
            <span>Bill Details</span>
        </div>
        <div class="step" id="step2">
            <div class="step-num">2</div>
            <span>Add Expenses</span>
        </div>
        <div class="step" id="step3">
            <div class="step-num">3</div>
            <span>Settle Up</span>
        </div>
    </div>

    <!-- ── Card 1: Bill Details ── -->
    <div class="bs-card" id="BillMetaCard">
        <div class="bs-card-header">
            <div class="header-icon"><i class="fas fa-receipt"></i></div>
            <h2>Bill Details</h2>
        </div>
        <div class="bs-card-body">
            <div style="display:flex; flex-direction:column; gap:20px;">
                <div>
                    <label class="bs-label" for="meta-bill-name">Bill Name</label>
                    <input type="text" class="bs-input" id="meta-bill-name"
                        placeholder="e.g. Weekend Trip, Dinner at Toit&hellip;" />
                </div>
                <div>
                    <label class="bs-label" for="members">Who&rsquo;s splitting?</label>
                    <select class="form-control" name="person" id="members" multiple="multiple"></select>
                    <div class="input-hint">
                        <i class="fas fa-info-circle"></i> Type a name and press Enter to add a member
                    </div>
                </div>
                <div>
                    <button class="btn-primary-bs" id="AddExpenseButton" type="button">
                        <i class="fas fa-arrow-right"></i> Continue to Add Expenses
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Card 2: Expenses ── -->
    <div class="bs-card hidden" id="ExpenditureCard">
        <div class="bs-card-header">
            <div class="header-icon"><i class="fas fa-list"></i></div>
            <div>
                <h2 id="BillName">Expenses</h2>
                <div style="font-size:0.76rem; color:var(--text-muted); margin-top:2px;" id="participants"></div>
            </div>
            <button class="btn-ghost" id="resetBtn" type="button" style="margin-left:auto;">
                <i class="fas fa-undo"></i> Start Over
            </button>
        </div>

        <div class="summary-bar hidden" id="summaryBar"></div>

        <div class="bs-card-body">
            <div class="expense-table-wrap">
                <table class="expense-table" id="expenseTable">
                    <colgroup>
                        <col style="width:155px">
                        <col>
                        <col style="width:115px">
                        <col style="width:210px">
                        <col style="width:54px">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Paid By</th>
                            <th>Description</th>
                            <th>Amount (&#8377;)</th>
                            <th>Shared By</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                <button class="btn-ghost add-new" type="button">
                    <i class="fas fa-plus"></i> Add Expense
                </button>
                <button class="btn-green" id="ExpenseReportButton" type="button" style="margin-left:auto;">
                    <i class="fas fa-calculator"></i> Calculate Settlement
                </button>
            </div>
        </div>
    </div>

    <!-- ── Card 3: Settlement Report ── -->
    <div class="bs-card hidden" id="ExpenseReportCard">
        <div class="bs-card-header">
            <div class="header-icon" style="background:var(--green-dim); color:var(--green);">
                <i class="fas fa-check-double"></i>
            </div>
            <h2>Settlement Plan</h2>
        </div>
        <div class="bs-card-body" id="ExpenseReportCardBody">
            <!-- Populated by AddExpense.js -->
        </div>
    </div>

</div><!-- /.app-wrapper -->

<!-- ══ FOOTER ═══════════════════════════════════════════════════════════ -->
<footer>
    <div class="social-links">
        <a href="https://www.facebook.com/gaurabjha" target="_blank" rel="noopener noreferrer" title="Facebook">

</body>
</html>
