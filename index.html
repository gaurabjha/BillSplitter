<!DOCTYPE html>
<html lang="en">
<head>
    <title>BillSplitter | Smart Settlements</title>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
        integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog=="
        crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="resources/js/split_algo.js"></script>
    <script src="resources/js/storage.js"></script>
    <script src="resources/js/utils.js"></script>
    <script src="resources/js/expenseTable.js"></script>
    <script src="resources/js/settlement.js"></script>
    <script src="resources/js/billManagement.js"></script>
    <script src="resources/js/AddExpense.js"></script>

    <style>
        /* ============================================================
           TOKENS
        ============================================================ */
        :root {
            --bg:           #09090b;
            --surface:      #121217;
            --surface2:     #1c1c24;
            --border:       rgba(255,255,255,0.08);
            --accent:       #8b5cf6;
            --accent-light: #c084fc;
            --accent-glow:  rgba(139,92,246,0.25);
            --green:        #10b981;
            --green-dim:    rgba(16,185,129,0.1);
            --red:          #ef4444;
            --red-dim:      rgba(239,68,68,0.1);
            --text:         #f4f4f5;
            --text-muted:   #a1a1aa;
            --text-dim:     #52525b;
            --radius:       20px;
            --radius-sm:    10px;
            --shadow:       0 10px 30px -10px rgba(0,0,0,0.5);
        }
        .light-theme {
            --bg:           #f8fafc;
            --surface:      #ffffff;
            --surface2:     #f1f5f9;
            --border:       rgba(0,0,0,0.06);
            --accent:       #6366f1;
            --accent-light: #4f46e5;
            --accent-glow:  rgba(99,102,241,0.12);
            --green:        #10b981;
            --green-dim:    rgba(16,185,129,0.1);
            --red:          #ef4444;
            --red-dim:      rgba(239,68,68,0.1);
            --text:         #0f172a;
            --text-muted:   #64748b;
            --text-dim:     #94a3b8;
            --shadow:       0 10px 30px -10px rgba(0,0,0,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            min-height: 100vh;
            min-width: 360px;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        /* ============================================================
           HEADER
        ============================================================ */
        header {
            position: sticky;
            top: 0;
            z-index: 900;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.3s, border-color 0.3s;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 17px;
            box-shadow: 0 4px 12px var(--accent-glow);
            flex-shrink: 0;
        }
        header h1 { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800; margin: 0; }

        /* header right controls */
        .header-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* theme toggle pill */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 9px;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 6px 13px;
            border-radius: 99px;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            user-select: none;
        }
        .theme-toggle:hover { border-color: var(--accent); }
        .switch-track {
            width: 34px; height: 19px;
            background: var(--text-dim);
            border-radius: 20px;
            position: relative;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .light-theme .switch-track { background: var(--accent); }
        .switch-thumb {
            width: 13px; height: 13px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 3px; left: 3px;
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }
        .light-theme .switch-thumb { transform: translateX(15px); }
        .toggle-label {
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* history button */
        .history-btn {
            width: 38px; height: 38px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .history-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
        }

        /* ============================================================
           LAYOUT
        ============================================================ */
        .app-wrapper { max-width: 960px; margin: 36px auto; padding: 0 20px 80px; }

        /* ============================================================
           STEPS
        ============================================================ */
        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 36px;
            padding: 0 10%;
            position: relative;
        }
        .steps::before {
            content: '';
            position: absolute;
            top: 18px; left: 15%; right: 15%;
            height: 2px;
            background: var(--border);
            z-index: 1;
        }
        .step { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .step-num {
            width: 36px; height: 36px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            color: var(--text-dim);
            transition: all 0.3s;
        }
        .step span { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em; }
        .step.active .step-num { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .step.active span { color: var(--accent); }
        .step.done .step-num { background: var(--green); border-color: var(--green); color: #fff; }
        .step.done span { color: var(--green); }

        /* ============================================================
           CARDS
        ============================================================ */
        .bs-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 24px;
            transition: background 0.3s, border-color 0.3s;
        }
        .bs-card-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bs-card-header h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin: 0; }
        .header-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--accent-glow);
            color: var(--accent-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; flex-shrink: 0;
        }
        .bs-card-body { padding: 24px; }

        /* ============================================================
           FORM
        ============================================================ */
        .bs-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .bs-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 9px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
        }
        .bs-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .input-hint { font-size: 0.72rem; color: var(--text-dim); margin-top: 6px; }

        /* ============================================================
           BUTTONS
        ============================================================ */
        .btn-primary-bs {
            background: var(--accent); color: #fff; border: none;
            border-radius: var(--radius-sm); padding: 11px 22px;
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary-bs:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 15px var(--accent-glow); }

        .btn-ghost {
            background: transparent; border: 1px solid var(--border); color: var(--text-muted);
            border-radius: var(--radius-sm); padding: 7px 14px;
            font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
            cursor: pointer; transition: border-color 0.2s, color 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent-light); }

        .btn-green {
            background: var(--green); color: #fff; border: none;
            border-radius: var(--radius-sm); padding: 11px 22px;
            font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: opacity 0.2s, transform 0.15s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-green:hover { opacity: 0.85; transform: translateY(-1px); }



        /* ============================================================
           SELECT2 OVERRIDES
        ============================================================ */
        .select2-container--default .select2-selection--multiple {
            background: var(--surface2) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
            min-height: 40px !important; padding: 3px 6px !important;
        }
        .select2-container--default.select2-container--focus .select2-selection--multiple {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important; outline: none !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background: var(--accent) !important; border: none !important; color: #fff !important;
            border-radius: 6px !important; padding: 2px 8px !important; font-size: 0.78rem;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            color: rgba(255,255,255,0.65) !important; margin-right: 4px;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__rendered { color: var(--text-muted) !important; }
        .select2-dropdown { background: var(--surface2) !important; border: 1px solid var(--border) !important; border-radius: var(--radius-sm) !important; }
        .select2-container--default .select2-results__option { color: var(--text) !important; padding: 8px 12px; font-size: 0.87rem; }
        .select2-container--default .select2-results__option--highlighted { background: var(--accent-glow) !important; color: var(--accent-light) !important; }
        .select2-container--default .select2-results__option[aria-selected="true"] { background: var(--surface) !important; color: var(--text-dim) !important; }
        .select2-search--dropdown .select2-search__field { background: var(--surface) !important; border: 1px solid var(--border) !important; color: var(--text) !important; border-radius: 6px !important; padding: 6px 10px; outline: none; }
        .select2-container--default .select2-selection--single { background: var(--surface2) !important; border: 1px solid var(--border) !important; border-radius: var(--radius-sm) !important; height: 38px !important; }
        .select2-container--default .select2-selection--single .select2-selection__rendered { color: var(--text) !important; line-height: 38px !important; padding-left: 12px !important; }
        .select2-container--default .select2-selection--single .select2-selection__arrow { top: 7px !important; }

        /* ============================================================
           EXPENSE TABLE
        ============================================================ */
        .expense-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; }
        table.expense-table { width: 100%; min-width: 700px; border-collapse: collapse; font-size: 0.87rem; }
        table.expense-table thead tr { background: var(--surface2); }
        table.expense-table th { padding: 11px 13px; color: var(--text-dim); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); white-space: nowrap; }
        table.expense-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; background: var(--surface); transition: background 0.15s; }
        table.expense-table tbody tr:last-child td { border-bottom: none; }
        table.expense-table tbody tr:hover td { background: var(--surface2); }
        .delete-btn { background: none; border: none; color: var(--red); cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: background 0.2s; font-size: 13px; }
        .delete-btn:hover { background: var(--red-dim); }

        /* ============================================================
           SUMMARY BAR
        ============================================================ */
        .summary-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 13px 24px; border-bottom: 1px solid var(--border); background: var(--surface2); }
        .summary-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.76rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
        .chip-name { color: var(--text); font-weight: 600; }
        .chip-amount { color: var(--accent-light); font-weight: 700; }

        /* ============================================================
           SETTLEMENT REPORT
        ============================================================ */
        .section-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700; margin-bottom: 12px; }
        .totals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 8px; }
        .total-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px; text-align: center; }
        .tc-name { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
        .tc-amount { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800; }

        .settlement-list { display: flex; flex-direction: column; gap: 11px; }
        .settlement-item {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 14px;
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            animation: fadeUp 0.35s ease both;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .settlement-info { display: flex; align-items: center; gap: 14px; flex: 1; }
        .settlement-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.74rem; font-weight: 700; flex-shrink: 0; }
        .av-0 { background: rgba(139,92,246,0.2);  color: #8b5cf6; }
        .av-1 { background: rgba(16,185,129,0.15); color: #10b981; }
        .av-2 { background: rgba(239,68,68,0.12);  color: #ef4444; }
        .av-3 { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .av-4 { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .settlement-text { font-size: 0.93rem; color: var(--text-muted); display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
        .settlement-text strong { color: var(--text); font-weight: 700; }
        .settlement-arrow { color: var(--text-dim); font-size: 12px; }
        .settlement-amount { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800; color: var(--green); background: var(--green-dim); padding: 5px 13px; border-radius: 9px; white-space: nowrap; }

        .no-debts { text-align: center; padding: 36px 20px; color: var(--text-muted); }
        .no-debts i { font-size: 2.2rem; color: var(--green); display: block; margin-bottom: 10px; }

        /* ============================================================
           SIDEBAR OVERLAY
        ============================================================ */
        #sidebarOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #sidebarOverlay.open { opacity: 1; pointer-events: all; }

        /* ============================================================
           HISTORY SIDEBAR
        ============================================================ */
        #historySidebar {
            position: fixed;
            top: 0; right: 0;
            width: 360px;
            max-width: 92vw;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
            box-shadow: -10px 0 40px rgba(0,0,0,0.35);
        }
        #historySidebar.open { transform: translateX(0); }

        .sidebar-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 800; margin: 0; flex: 1; }
        #sidebarClose {
            width: 32px; height: 32px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            transition: border-color 0.2s, color 0.2s;
        }
        #sidebarClose:hover { border-color: var(--red); color: var(--red); }

        #sidebarList {
            flex: 1;
            overflow-y: auto;
            padding: 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #sidebarList::-webkit-scrollbar { width: 4px; }
        #sidebarList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .sidebar-empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-dim);
        }
        .sidebar-empty i { font-size: 2rem; display: block; margin-bottom: 12px; color: var(--text-dim); }
        .sidebar-empty p { font-size: 0.83rem; line-height: 1.5; }

        /* Bill card in sidebar */
        .sidebar-bill-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 13px;
            padding: 14px 15px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .sidebar-bill-card:hover { border-color: var(--accent); }
        .sidebar-bill-card.active { border-color: var(--accent); background: var(--accent-glow); }

        .sbc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 7px; }
        .sbc-name { font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700; color: var(--text); line-height: 1.3; }
        .sbc-delete {
            background: none; border: none; color: var(--text-dim); cursor: pointer;
            padding: 2px 5px; border-radius: 5px; font-size: 12px; flex-shrink: 0;
            transition: color 0.2s, background 0.2s;
        }
        .sbc-delete:hover { color: var(--red); background: var(--red-dim); }

        .sbc-meta {
            display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 5px;
            font-size: 0.72rem; color: var(--text-dim);
        }
        .sbc-meta span { display: flex; align-items: center; gap: 4px; }
        .sbc-meta i { font-size: 10px; }

        .sbc-participants {
            font-size: 0.74rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sbc-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            padding-top: 9px;
            margin-top: 2px;
        }
        .sbc-total { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 800; color: var(--green); }
        .sbc-settlements { font-size: 0.72rem; color: var(--text-dim); }

        .sidebar-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--text-dim);
            text-align: center;
        }

        /* ============================================================
           AUTOSAVE TOAST
        ============================================================ */
        #autosaveToast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--green);
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.83rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 2000;
            box-shadow: 0 6px 20px rgba(16,185,129,0.35);
            animation: slideUp 0.3s ease;
            transition: opacity 0.4s;
        }
        #autosaveToast.fade-out { opacity: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Bill ID badge in expense card header */
        #billIdBadge {
            margin-left: auto;
            font-size: 0.68rem;
            color: var(--text-dim);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 9px;
            font-family: monospace;
            letter-spacing: 0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* Bill ID in sidebar card */
        .sbc-id {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-family: monospace;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sbc-id i { font-size: 9px; }

        /* Sidebar action buttons (Import / Export All) */
        .sb-action-btn {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 8px 10px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .sb-action-btn:hover { border-color: var(--accent); color: var(--accent-light); background: var(--accent-glow); }

        /* Export / Share buttons in settlement card */
        .btn-export-current {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: opacity 0.2s, transform 0.15s;
            margin-left: 6px;
        }
        .btn-export-current:first-of-type { margin-left: auto; }
        .btn-export-current:hover { opacity: 0.88; transform: translateY(-1px); }

        /* Per-bill export button in sidebar */
        .sbc-export {
            background: none; border: none; color: var(--text-dim); cursor: pointer;
            padding: 2px 5px; border-radius: 5px; font-size: 11px; flex-shrink: 0;
            transition: color 0.2s, background 0.2s;
        }
        .sbc-export:hover { color: var(--accent-light); background: var(--accent-glow); }

        /* ============================================================
           UTILITIES
        ============================================================ */
        .hidden { display: none !important; }

        /* ============================================================
           FOOTER
        ============================================================ */
        footer { text-align: center; padding: 36px 20px; color: var(--text-dim); font-size: 0.8rem; }
        footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: var(--accent-light); }
        .social-links { display: flex; justify-content: center; gap: 12px; margin-bottom: 12px; }
        .social-links a { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: border-color 0.2s, color 0.2s, background 0.2s; }
        .social-links a:hover { border-color: var(--accent); color: var(--accent-light); background: var(--accent-glow); }

        @media (max-width: 600px) {
            header { padding: 12px 14px; }
            .toggle-label { display: none; }
            .app-wrapper { margin: 18px auto; }
            .bs-card-body { padding: 16px; }
            .steps { padding: 0 4%; }
            #historySidebar { width: 100%; max-width: 100%; }
        }
    </style>
</head>

<body>

<!-- SIDEBAR OVERLAY -->
<div id="sidebarOverlay"></div>

<!-- HISTORY SIDEBAR -->
<div id="historySidebar">
    <div class="sidebar-header">
        <div class="header-icon" style="flex-shrink:0;"><i class="fas fa-history"></i></div>
        <h3>Saved Bills</h3>
        <button id="sidebarClose" type="button"><i class="fas fa-times"></i></button>
    </div>
    <div id="sidebarList"><!-- populated by JS --></div>
    <div class="sidebar-footer">
        <div style="display:flex;gap:8px;margin-bottom:10px;">
            <button class="sb-action-btn" id="importBillBtn" type="button" title="Import a bill from a .json file">
                <i class="fas fa-file-import"></i> Import
            </button>
            <button class="sb-action-btn" id="exportAllBtn" type="button" title="Export all saved bills as JSON">
                <i class="fas fa-file-export"></i> Export All
            </button>
        </div>
        <div>Bills saved in browser &bull; <a href="#" id="importLink" style="color:var(--accent-light);text-decoration:none;">import a file</a></div>
        <input type="file" id="importFileInput" accept=".json" style="display:none;" />
    </div>
</div>

<!-- HEADER -->
<header>
    <div class="logo-icon"><i class="fas fa-divide"></i></div>
    <h1>BillSplitter</h1>

    <div class="header-controls">
        <!-- Theme Toggle -->
        <div class="theme-toggle" id="themeToggle">
            <div class="switch-track"><div class="switch-thumb"></div></div>
            <span class="toggle-label" id="themeLabel">Light</span>
        </div>

        <!-- History / Sidebar Button -->
        <button class="history-btn" id="historyBtn" type="button" title="Saved Bills">
            <i class="fas fa-ellipsis-v"></i>
        </button>
    </div>
</header>

<!-- APP -->
<div class="app-wrapper">

    <!-- Step Indicator -->
    <div class="steps">
        <div class="step active" id="step1"><div class="step-num">1</div><span>Setup</span></div>
        <div class="step" id="step2"><div class="step-num">2</div><span>Expenses</span></div>
        <div class="step" id="step3"><div class="step-num">3</div><span>Settle</span></div>
    </div>

    <!-- Card 1: Bill Details -->
    <div class="bs-card" id="BillMetaCard">
        <div class="bs-card-header">
            <div class="header-icon"><i class="fas fa-receipt"></i></div>
            <h2>General Details</h2>
        </div>
        <div class="bs-card-body">
            <div style="display:flex; flex-direction:column; gap:20px;">
                <div>
                    <label class="bs-label" for="meta-bill-name">Bill Name</label>
                    <input type="text" class="bs-input" id="meta-bill-name" placeholder="e.g. Dinner Outing, Weekend Trip&hellip;" />
                </div>
                <div>
                    <label class="bs-label" for="members">Participants</label>
                    <select class="form-control" name="person" id="members" multiple="multiple"></select>
                    <div class="input-hint"><i class="fas fa-info-circle"></i> Type a name and press Enter to add</div>
                </div>
                <div>
                    <button class="btn-primary-bs w-100" id="AddExpenseButton" type="button">
                        Continue to Expenses
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Card 2: Expenses -->
    <div class="bs-card hidden" id="ExpenditureCard">
        <div class="bs-card-header">
            <div class="header-icon"><i class="fas fa-list"></i></div>
            <div>
                <h2 id="BillName">Expenses</h2>
                <div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;" id="participants"></div>
            </div>
            <button class="btn-ghost" id="resetBtn" type="button" style="margin-left:auto;">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>
        <div class="summary-bar hidden" id="summaryBar"></div>
        <div class="bs-card-body">
            <div class="expense-table-wrap mb-4">
                <table class="expense-table" id="expenseTable">
                    <colgroup>
                        <col style="width:165px"><col><col style="width:118px"><col style="width:215px"><col style="width:52px">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Paid By</th>
                            <th>Description</th>
                            <th>Amount (&#8377;)</th>
                            <th>Shared By</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                <button class="btn-ghost add-new" type="button"><i class="fas fa-plus"></i> Add Line</button>
                <button class="btn-green" id="ExpenseReportButton" type="button">
                    <i class="fas fa-calculator"></i> Generate Settlement
                </button>
            </div>
        </div>
    </div>

    <!-- Card 3: Settlement Report -->
    <div class="bs-card hidden" id="ExpenseReportCard">
        <div class="bs-card-header" id="settlementCardHeader">
            <div class="header-icon" style="background:var(--green-dim); color:var(--green);">
                <i class="fas fa-check-double"></i>
            </div>
            <h2>Final Settlement</h2>
            <button class="btn-export-current" id="exportCurrentBtn" type="button" title="Export this bill as JSON">
                <i class="fas fa-download"></i> Export
            </button>
            <button class="btn-export-current" id="shareCurrentBtn" type="button" title="Copy shareable text summary" style="background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);">
                <i class="fas fa-share-alt"></i> Share
            </button>
        </div>
        <div class="bs-card-body" id="ExpenseReportCardBody">
            <!-- Populated by AddExpense.js -->
        </div>
    </div>

</div><!-- /.app-wrapper -->

<!-- FOOTER -->
<footer>
    <div class="social-links">
        <a href="https://www.facebook.com/gaurabjha" target="_blank" rel="noopener noreferrer" title="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="https://twitter.com/gaurab_j" target="_blank" rel="noopener noreferrer" title="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="mailto:gaurabkjha@gmail.com" title="Email"><i class="fab fa-google"></i></a>
        <a href="https://www.instagram.com/l0gan.pi" target="_blank" rel="noopener noreferrer" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://www.linkedin.com/in/gaurabjha/" target="_blank" rel="noopener noreferrer" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        <a href="https://github.com/gaurabjha" target="_blank" rel="noopener noreferrer" title="GitHub"><i class="fab fa-github"></i></a>
    </div>
    <div>&copy; 2026 BillSplitter &bull; Crafted for Clarity</div>
</footer>

<!-- THEME SCRIPT -->
<script>
    var _html    = document.documentElement;
    var _toggle  = document.getElementById('themeToggle');
    var _label   = document.getElementById('themeLabel');
    var _isLight = false;

    function applyTheme(light) {
        _isLight = light;
        if (light) { _html.classList.add('light-theme'); } else { _html.classList.remove('light-theme'); }
        _label.textContent = light ? 'Dark' : 'Light';
    }

    _toggle.addEventListener('click', function () { applyTheme(!_isLight); });
</script>

</body>
</html>
