<!DOCTYPE html>
<html lang="en">
<head>
    <title>BillSplitter | Smart Settlements</title>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
        integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog=="
        crossorigin="anonymous" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!-- App scripts -->
    <script src="resources/js/split_algo.js"></script>
    <script src="resources/js/AddExpense.js"></script>

    <style>
        /* ── DARK THEME (default) ───────────────── */
        :root {
            --bg:           #09090b;
            --surface:      #121217;
            --surface2:     #1c1c24;
            --border:       rgba(255,255,255,0.08);
            --accent:       #8b5cf6;
            --accent-light: #c084fc;
            --accent-glow:  rgba(139,92,246,0.25);
            --green:        #10b981;
            --green-dim:    rgba(16,185,129,0.1);
            --red:          #ef4444;
            --red-dim:      rgba(239,68,68,0.1);
            --text:         #f4f4f5;
            --text-muted:   #a1a1aa;
            --text-dim:     #52525b;
            --radius:       20px;
            --radius-sm:    10px;
            --shadow:       0 10px 30px -10px rgba(0,0,0,0.5);
        }

        /* ── LIGHT THEME ────────────────────────── */
        .light-theme {
            --bg:           #f8fafc;
            --surface:      #ffffff;
            --surface2:     #f1f5f9;
            --border:       rgba(0,0,0,0.06);
            --accent:       #6366f1;
            --accent-light: #4f46e5;
            --accent-glow:  rgba(99,102,241,0.12);
            --green:        #10b981;
            --green-dim:    rgba(16,185,129,0.1);
            --red:          #ef4444;
            --red-dim:      rgba(239,68,68,0.1);
            --text:         #0f172a;
            --text-muted:   #64748b;
            --text-dim:     #94a3b8;
            --shadow:       0 10px 30px -10px rgba(0,0,0,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            min-height: 100vh;
            min-width: 360px;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        /* ── HEADER ─────────────────────────────── */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 16px 30px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: background 0.3s, border-color 0.3s;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 18px;
            box-shadow: 0 4px 12px var(--accent-glow);
            flex-shrink: 0;
        }
        header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            margin: 0;
        }
        header p { margin: 0; color: var(--text-muted); font-size: 0.82rem; }

        /* ── THEME TOGGLE ───────────────────────── */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 99px;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            user-select: none;
        }
        .theme-toggle:hover { border-color: var(--accent); }
        .switch-track {
            width: 36px; height: 20px;
            background: var(--text-dim);
            border-radius: 20px;
            position: relative;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .light-theme .switch-track { background: var(--accent); }
        .switch-thumb {
            width: 14px; height: 14px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 3px; left: 3px;
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }
        .light-theme .switch-thumb { transform: translateX(16px); }
        .toggle-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* ── LAYOUT ─────────────────────────────── */
        .app-wrapper {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px 80px;
        }

        /* ── STEP INDICATOR ─────────────────────── */
        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            padding: 0 10%;
            position: relative;
        }
        .steps::before {
            content: '';
            position: absolute;
            top: 18px; left: 15%; right: 15%;
            height: 2px;
            background: var(--border);
            z-index: 1;
        }
        .step {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .step-num {
            width: 36px; height: 36px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            color: var(--text-dim);
            transition: border-color 0.3s, color 0.3s, background 0.3s, box-shadow 0.3s;
        }
        .step span {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }
        .step.active .step-num {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .step.active span { color: var(--accent); }
        .step.done .step-num {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
        }
        .step.done span { color: var(--green); }

        /* ── CARDS ──────────────────────────────── */
        .bs-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 24px;
            transition: background 0.3s, border-color 0.3s;
        }
        .bs-card-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bs-card-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin: 0;
        }
        .header-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--accent-glow);
            color: var(--accent-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }
        .bs-card-body { padding: 25px; }

        /* ── FORM ───────────────────────────────── */
        .bs-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .bs-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
        }
        .bs-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .input-hint {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* ── BUTTONS ────────────────────────────── */
        .btn-primary-bs {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 12px 24px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary-bs:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            padding: 8px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.83rem;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent-light); }
        .btn-green {
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 12px 24px;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-green:hover { opacity: 0.85; transform: translateY(-1px); }

        /* ── SELECT2 OVERRIDES ──────────────────── */
        .select2-container--default .select2-selection--multiple {
            background: var(--surface2) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
            min-height: 40px !important;
            padding: 3px 6px !important;
        }
        .select2-container--default.select2-container--focus .select2-selection--multiple {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-glow) !important;
            outline: none !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background: var(--accent) !important;
            border: none !important;
            color: #fff !important;
            border-radius: 6px !important;
            padding: 2px 8px !important;
            font-size: 0.78rem;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            color: rgba(255,255,255,0.65) !important;
            margin-right: 4px;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__rendered {
            color: var(--text-muted) !important;
        }
        .select2-dropdown {
            background: var(--surface2) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
        }
        .select2-container--default .select2-results__option {
            color: var(--text) !important;
            padding: 8px 12px;
            font-size: 0.87rem;
        }
        .select2-container--default .select2-results__option--highlighted {
            background: var(--accent-glow) !important;
            color: var(--accent-light) !important;
        }
        .select2-container--default .select2-results__option[aria-selected="true"] {
            background: var(--surface) !important;
            color: var(--text-dim) !important;
        }
        .select2-search--dropdown .select2-search__field {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 6px !important;
            padding: 6px 10px;
            outline: none;
        }
        .select2-container--default .select2-selection--single {
            background: var(--surface2) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
            height: 38px !important;
        }
        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: var(--text) !important;
            line-height: 38px !important;
            padding-left: 12px !important;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow {
            top: 7px !important;
        }

        /* ── EXPENSE TABLE ──────────────────────── */
        .expense-table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        table.expense-table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            font-size: 0.87rem;
        }
        table.expense-table thead tr { background: var(--surface2); }
        table.expense-table th {
            padding: 12px 15px;
            color: var(--text-dim);
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        table.expense-table td {
            padding: 11px 11px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            background: var(--surface);
            transition: background 0.15s;
        }
        table.expense-table tbody tr:last-child td { border-bottom: none; }
        table.expense-table tbody tr:hover td { background: var(--surface2); }
        .delete-btn {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background 0.2s;
            font-size: 13px;
        }
        .delete-btn:hover { background: var(--red-dim); }

        /* ── SUMMARY BAR ────────────────────────── */
        .summary-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 25px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .summary-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.76rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .chip-name { color: var(--text); font-weight: 600; }
        .chip-amount { color: var(--accent-light); font-weight: 700; }

        /* ── REPORT ─────────────────────────────── */
        .section-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .totals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 8px;
        }
        .total-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            text-align: center;
        }
        .tc-name { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
        .tc-amount { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800; }

        .settlement-list { display: flex; flex-direction: column; gap: 12px; }
        .settlement-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeUp 0.35s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .settlement-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        .settlement-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .av-0 { background: rgba(139,92,246,0.2); color: #8b5cf6; }
        .av-1 { background: rgba(16,185,129,0.15); color: #10b981; }
        .av-2 { background: rgba(239,68,68,0.12);  color: #ef4444; }
        .av-3 { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .av-4 { background: rgba(59,130,246,0.15); color: #3b82f6; }

        .settlement-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .settlement-text strong { color: var(--text); font-weight: 700; }
        .settlement-arrow { color: var(--text-dim); font-size: 13px; }
        .settlement-amount {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--green);
            background: var(--green-dim);
            padding: 6px 14px;
            border-radius: 10px;
        }

        .no-debts { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .no-debts i { font-size: 2.5rem; color: var(--green); display: block; margin-bottom: 12px; }

        /* ── UTILITIES ──────────────────────────── */
        .hidden { display: none !important; }

        /* ── FOOTER ─────────────────────────────── */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
        footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: var(--accent-light); }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .social-links a {
            width: 34px; height: 34px;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .social-links a:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
        }

        @media (max-width: 600px) {
            header { padding: 14px 16px; }
            .toggle-label { display: none; }
            .app-wrapper { margin: 20px auto; }
            .bs-card-body { padding: 16px; }
            .steps { padding: 0 5%; }
        }
    </style>
</head>

<body>

<!-- ══ HEADER ═══════════════════════════════════════════════════════════ -->
<header>
    <div class="logo-icon"><i class="fas fa-divide"></i></div>
    <div>
        <h1>BillSplitter</h1>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <div class="switch-track"><div class="switch-thumb"></div></div>
        <span class="toggle-label" id="themeLabel">Light</span>
    </div>
</header>

<!-- ══ APP ══════════════════════════════════════════════════════════════ -->
<div class="app-wrapper">

    <!-- Step Indicator -->
    <div class="steps">
        <div class="step active" id="step1">
            <div class="step-num">1</div>
            <span>Setup</span>
        </div>
        <div class="step" id="step2">
            <div class="step-num">2</div>
            <span>Expenses</span>
        </div>
        <div class="step" id="step3">
            <div class="step-num">3</div>
            <span>Settle</span>
        </div>
    </div>

    <!-- ── Card 1: Bill Details ── -->
    <div class="bs-card" id="BillMetaCard">
        <div class="bs-card-header">
            <div class="header-icon"><i class="fas fa-receipt"></i></div>
            <h2>General Details</h2>
        </div>
        <div class="bs-card-body">
            <div style="display:flex; flex-direction:column; gap:20px;">
                <div>
                    <label class="bs-label" for="meta-bill-name">Bill Name</label>
                    <input type="text" class="bs-input" id="meta-bill-name"
                        placeholder="e.g. Dinner Outing, Weekend Trip&hellip;" />
                </div>
                <div>
                    <label class="bs-label" for="members">Participants</label>
                    <select class="form-control" name="person" id="members" multiple="multiple"></select>
                    <div class="input-hint">
                        <i class="fas fa-info-circle"></i> Type a name and press Enter to add
                    </div>
                </div>
                <div>
                    <button class="btn-primary-bs w-100" id="AddExpenseButton" type="button">
                        Continue to Expenses
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Card 2: Expenses ── -->
    <div class="bs-card hidden" id="ExpenditureCard">
        <div class="bs-card-header">
            <div class="header-icon"><i class="fas fa-list"></i></div>
            <div>
                <h2 id="BillName">Expenses</h2>
                <div style="font-size:0.76rem; color:var(--text-muted); margin-top:2px;" id="participants"></div>
            </div>
            <button class="btn-ghost" id="resetBtn" type="button" style="margin-left:auto;">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>

        <div class="summary-bar hidden" id="summaryBar"></div>

        <div class="bs-card-body">
            <div class="expense-table-wrap mb-4">
                <table class="expense-table" id="expenseTable">
                    <colgroup>
                        <col style="width:170px">
                        <col>
                        <col style="width:120px">
                        <col style="width:220px">
                        <col style="width:54px">
                    </colgroup>
                    <thead>
                        <tr>

<!-- ══ THEME TOGGLE SCRIPT ════════════════════════════════════════════════ -->
<script>
    (function () {
        var html   = document.documentElement;
        var toggle = document.getElementById('themeToggle');
        var label  = document.getElementById('themeLabel');
        var isLight = false;

        function applyTheme(light) {
            isLight = light;
            if (light) {
                html.classList.add('light-theme');
            } else {
                html.classList.remove('light-theme');
            }
            label.textContent = light ? 'Dark' : 'Light';
            try { localStorage.setItem('theme', light ? 'light' : 'dark'); } catch(e) {}
        }

        toggle.addEventListener('click', function () {
            applyTheme(!isLight);
        });

        // Restore saved preference
        try {
            if (localStorage.getItem('theme') === 'light') {
                applyTheme(true);
            }
        } catch(e) {}
    })();
</script>
